name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Code Quality & Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Formatting (Prettier)
        run: npx prettier --check .

      - name: Lint Source Code (ESLint)
        run: npm run lint

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit

      - name: Run Unit Tests (Vitest)
        run: npm run test

      - name: Verify Production Build
        run: npm run build
